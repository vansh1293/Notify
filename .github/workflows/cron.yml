name: Scheduled API Jobs

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:         # optional manual trigger

jobs:
  run-cron:
    runs-on: ubuntu-latest

    steps:
      - name: Call send-reminders API
        run: curl -X GET https://notify.vansharora.codes/api/send-reminders

      - name: Call update-contest API
        run: curl -X GET https://notify.vansharora.codes/api/update-contest
